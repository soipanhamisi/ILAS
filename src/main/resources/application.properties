spring.config.import=file:.env[.properties]

spring.application.name=ILAS
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# File upload settings for exam assessments
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.storage.upload-dir=storage/exam-assessments

# Runtime monitoring settings for admin dashboard
server.tomcat.threads.max=200
monitoring.sample-interval-ms=5000
monitoring.active-user-timeout-ms=120000
monitoring.history.max-points=72

# Auto-grading LLM settings
grading.llm.provider=${GRADING_LLM_PROVIDER:github-models}
grading.llm.endpoint-url=${GRADING_LLM_ENDPOINT_URL:}
grading.llm.api-key=${GRADING_LLM_API_KEY:}
grading.llm.model=${GRADING_LLM_MODEL:gpt-4o-mini}
grading.llm.timeout-seconds=${GRADING_LLM_TIMEOUT_SECONDS:30}
grading.llm.temperature=${GRADING_LLM_TEMPERATURE:0.0}

# Provider-specific credentials (GitHub Models)
grading.llm.github.endpoint-url=${GITHUB_MODELS_ENDPOINT_URL:https://models.inference.ai.azure.com/chat/completions}
grading.llm.github.api-key=${GITHUB_MODELS_API_KEY:${GRADING_LLM_API_KEY:}}
grading.llm.github.model=${GITHUB_MODELS_MODEL:openai/gpt-4.1-mini}

# Provider-specific credentials (Gemini Studio)
grading.llm.gemini.endpoint-url=${GEMINI_STUDIO_ENDPOINT_URL:https://generativelanguage.googleapis.com/v1beta/models}
grading.llm.gemini.api-key=${GEMINI_STUDIO_API_KEY:${GRADING_LLM_API_KEY:}}
grading.llm.gemini.model=${GEMINI_STUDIO_MODEL:gemini-2.0-flash}

