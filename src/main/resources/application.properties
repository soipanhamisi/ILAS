spring.config.import=file:.env[.properties]

spring.application.name=ILAS
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# File upload settings for exam assessments
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.storage.upload-dir=storage/exam-assessments

# Runtime monitoring settings for admin dashboard
server.tomcat.threads.max=200
monitoring.sample-interval-ms=5000
monitoring.active-user-timeout-ms=120000
monitoring.history.max-points=72

# WebSocket configuration
websocket.enabled=true
websocket.path=/ws/monitoring
websocket.heartbeat-interval=30000
websocket.connection-timeout=60000

