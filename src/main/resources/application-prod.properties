spring.config.import=optional:file:.env.deployment

# File upload settings for exam assessments
file.storage.provider=${FILE_STORAGE_PROVIDER:azure}
file.storage.upload-dir=${FILE_STORAGE_UPLOAD_DIR:storage/exam-assessments}
file.storage.azure.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
file.storage.azure.container=${AZURE_STORAGE_CONTAINER:exam-assesments}

# Production overrides for Azure deployments
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# Keep logs concise in App Service/container logs
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# CORS allowlist for hosted frontend (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-frontend-app.azurestaticapps.net}
